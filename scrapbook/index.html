<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano Tiles Pose Test</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
      }

      canvas {
        display: block;
        margin: 0 auto;
      }
      
      input[type="checkbox"] {
        transform: scale(1.5);
        margin-right: 8px;
      }

      button {
        background: #444;
        color: white;
        border: 1px solid #666;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
        margin-left: 10px;
      }

      button:hover {
        background: #555;
      }

      .controls {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
      }
    </style>

    <!-- p5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

    <!-- ml5 -->
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  </head>
  <body>
    <div class="controls">
      <div id="checkboxContainer"></div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
